<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐊 Coco's Run - Sincronizado</title>
    <style>
        :root { --gold: #e6a800; }
        body {
            margin: 0; overflow: hidden; touch-action: none;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0f0a; user-select: none;
        }
        #vignette {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
            pointer-events: none; z-index: 5;
        }
        #ui {
            position: absolute; top: 25px; left: 25px;
            color: #fff; background: rgba(15, 25, 10, 0.8);
            backdrop-filter: blur(15px); padding: 12px 30px;
            border-radius: 40px; display: none; align-items: center; gap: 20px;
            font-weight: 500; box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,200,0.15);
            z-index: 10; pointer-events: none;
        }
        #ui span { font-size: 16px; text-shadow: 0 2px 8px black; }
        #timer-display { color: #ffaa00; font-size: 24px !important; font-weight: bold; }
        #message {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-size: 48px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            padding: 30px 60px; border-radius: 30px; text-align: center;
            display: none; z-index: 20;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        }
        #message span { display: block; font-size: 22px; margin-top: 15px; color: var(--gold); }
        #start-screen {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(10,30,10,0.9) 0%, rgba(0,0,0,0.95) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 30; backdrop-filter: blur(5px);
        }
        #start-screen h1 {
            font-size: 70px; margin: 0;
            text-shadow: 0 0 30px #2d8a2d, 0 0 60px #1a5a1a;
            letter-spacing: 3px;
        }
        #start-screen p { font-size: 22px; margin: 25px 0; opacity: 0.9; }
        #start-screen button {
            padding: 18px 50px; font-size: 26px;
            background: linear-gradient(180deg, #3a6a2a, #1a3a1a);
            color: #ddd; border: none; border-radius: 50px;
            cursor: pointer; transition: 0.3s; margin-top: 25px;
            box-shadow: 0 0 35px #2a5a2a; font-weight: bold;
            letter-spacing: 1px; text-transform: uppercase;
        }
        #start-screen button:hover {
            background: linear-gradient(180deg, #4a8a3a, #2a4a2a);
            box-shadow: 0 0 55px #4a7a4a; transform: scale(1.03);
        }
        @media (max-width: 600px) {
            #ui { top: 10px; left: 10px; padding: 8px 15px; gap: 15px; }
            #ui span { font-size: 14px; }
            #timer-display { font-size: 20px !important; }
            #start-screen h1 { font-size: 48px; }
            #start-screen button { font-size: 22px; padding: 14px 35px; }
        }
    </style>
</head>
<body>
    <div id="vignette"></div>
    <div id="ui">
        <span>🐊 <span id="laneInd">centro</span></span>
        <span id="timer-display">1:30</span>
    </div>
    <div id="message">
        <span id="messageText"></span>
        <span id="messageSub"></span>
    </div>
    <div id="start-screen">
        <h1>🐊 Coco's Run</h1>
        <p>Sincronizado con la música</p>
        <button id="startButton">▶ CORRER</button>
        <p style="margin-top:30px; color:#aaa;">Cada obstáculo cae al ritmo🎵</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.126.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== MÚSICA DE FONDO ====================
        const bgMusic = new Audio('https://raw.githubusercontent.com/SLOBIROSERVER/Level-1/main/Untitled%20Project%20-%20Track%202%20-%20Sonauto.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.25;
        let musicStarted = false;

        // Sincronización: 128 BPM = 128 beats por minuto = 60/128 = 0.46875 segundos por beat
        const BPM = 128;
        const BEAT_DURATION = 60 / BPM; // ~0.46875s
        const OBSTACLE_BEATS = 4; // un obstáculo cada 4 beats (~1.875s)
        const OBSTACLE_INTERVAL = BEAT_DURATION * OBSTACLE_BEATS; // ~1.875s

        function startMusic() {
            if (!musicStarted) {
                bgMusic.play().catch(() => {});
                musicStarted = true;
            } else {
                bgMusic.currentTime = 0;
                bgMusic.play();
            }
        }
        function stopMusic() {
            bgMusic.pause();
            bgMusic.currentTime = 0;
        }
        function restartMusic() {
            bgMusic.pause();
            bgMusic.currentTime = 0;
            bgMusic.play();
        }

        // ==================== AUDIO (SOLO GRITO) ====================
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }
        function playCrocScream() {
            const ctx = getAudioCtx(); const now = ctx.currentTime;
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
            gain.gain.setValueAtTime(0.5, now); gain.gain.linearRampToValueAtTime(0.3, now + 0.3);
            osc.connect(gain); gain.connect(ctx.destination);
            const vibrato = ctx.createOscillator(), vGain = ctx.createGain();
            vibrato.frequency.value = 8; vGain.gain.value = 10;
            vibrato.connect(vGain); vGain.connect(osc.frequency);
            vibrato.start(now); osc.start(now); vibrato.stop(now + 0.35); osc.stop(now + 0.35);
        }

        // ==================== ESCENA ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x4a7aa0);
        scene.fog = null;

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.3, 100);
        camera.position.set(0, 5.8, 7.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0x445566, 0.4);
        scene.add(ambient);
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.6);
        sunLight.position.set(30, 40, 20);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048; sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5; sunLight.shadow.camera.far = 80;
        sunLight.shadow.camera.left = -25; sunLight.shadow.camera.right = 25;
        sunLight.shadow.camera.top = 15; sunLight.shadow.camera.bottom = -5;
        sunLight.shadow.bias = -0.0002;
        scene.add(sunLight);

        const backLight = new THREE.PointLight(0xccbbaa, 0.5, 15);
        backLight.position.set(0, 2.5, 2.5);
        scene.add(backLight);

        // ==================== TEXTURAS ====================
        function createGrassTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1a3a1a'; ctx.fillRect(0,0,256,256);
            for (let i=0; i<200; i++) {
                ctx.fillStyle = `rgb(${20+Math.random()*15},${40+Math.random()*20},${8+Math.random()*10})`;
                ctx.fillRect(Math.random()*256, Math.random()*256, 2+Math.random()*4, 10+Math.random()*10);
            }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(6,12); return tex;
        }
        function createWaterTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#031510'; ctx.fillRect(0,0,256,256);
            for (let i=0; i<100; i++) {
                ctx.fillStyle = `rgba(5,30,20,${0.3+Math.random()*0.5})`;
                ctx.beginPath(); ctx.arc(Math.random()*256, Math.random()*256, 5+Math.random()*20, 0, Math.PI*2); ctx.fill();
            }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(3,6); return tex;
        }
        function createBarkTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1a0a00'; ctx.fillRect(0,0,128,256);
            for (let i=0; i<80; i++) {
                ctx.strokeStyle = `rgb(${20+Math.random()*10},${10+Math.random()*8},${3})`;
                ctx.lineWidth = 1+Math.random()*3;
                ctx.beginPath(); ctx.moveTo(Math.random()*128, 0); ctx.lineTo(Math.random()*128, 256); ctx.stroke();
            }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
        }
        const grassTex = createGrassTexture(), waterTex = createWaterTexture(), barkTex = createBarkTexture();

        // ==================== SOL, NUBES, PÁJAROS ====================
        const sunSphere = new THREE.Mesh(new THREE.SphereGeometry(3.5,32,32), new THREE.MeshBasicMaterial({ color: 0xffcc44 }));
        sunSphere.position.set(25,38,-35); scene.add(sunSphere);

        const clouds = [];
        function createCloud(x,y,z) {
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color:0xffffff, transparent:true, opacity:0.85, roughness:0.1 });
            const geo = new THREE.SphereGeometry(1.2,7,7);
            [[0,0,0],[1.3,0.4,0.3],[-1.2,0.3,-0.2],[0.6,0.7,0.5],[-0.7,0.5,-0.6],[1.0,-0.2,0.2],[-0.9,-0.1,-0.3]].forEach(p => {
                const part = new THREE.Mesh(geo, mat); part.position.set(p[0],p[1],p[2]); part.scale.set(0.7+Math.random()*0.6,0.4,0.7+Math.random()*0.6); g.add(part);
            });
            g.position.set(x,y,z); scene.add(g); return g;
        }
        for (let i=0; i<25; i++) clouds.push(createCloud((Math.random()-0.5)*50, 14+Math.random()*15, (Math.random()-0.5)*80-15));

        const birds = [];
        for (let i=0; i<18; i++) {
            const bg = new THREE.Group();
            const wm = new THREE.MeshStandardMaterial({ color:0x111122 });
            const lw = new THREE.Mesh(new THREE.ConeGeometry(0.15,0.5,4), wm); lw.rotation.z=Math.PI/4; lw.position.x=-0.15; bg.add(lw);
            const rw = new THREE.Mesh(new THREE.ConeGeometry(0.15,0.5,4), wm); rw.rotation.z=-Math.PI/4; rw.position.x=0.15; bg.add(rw);
            bg.position.set((Math.random()-0.5)*30, 11+Math.random()*9, (Math.random()-0.5)*45-10);
            bg.userData = { speed:0.02+Math.random()*0.05, radius:3+Math.random()*6, angle:Math.random()*Math.PI*2, baseY:bg.position.y };
            scene.add(bg); birds.push(bg);
        }

        // ==================== TERRENO Y VEGETACIÓN ====================
        const grassMat = new THREE.MeshStandardMaterial({ map: grassTex, roughness:0.95 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30,90), grassMat);
        ground.rotation.x = -Math.PI/2; ground.position.set(0,-0.3,-18); ground.receiveShadow = true; scene.add(ground);

        const lakeMat = new THREE.MeshStandardMaterial({ map: waterTex, roughness:0.2, metalness:0.5 });
        function createLake(x,z,w,d) {
            const lake = new THREE.Mesh(new THREE.PlaneGeometry(w,d), lakeMat);
            lake.rotation.x = -Math.PI/2; lake.position.set(x,-0.05,z); lake.receiveShadow = true; scene.add(lake);
        }
        createLake(-7,-20,5,10); createLake(8,10,4,8); createLake(-5,30,6,12);

        const mountainCanvas = document.createElement('canvas'); mountainCanvas.width=128; mountainCanvas.height=128;
        const mctx = mountainCanvas.getContext('2d');
        mctx.fillStyle='#3a3a2a'; mctx.fillRect(0,0,128,128);
        for (let i=0; i<200; i++) {
            mctx.fillStyle=`rgb(${40+Math.random()*10},${40+Math.random()*10},${30+Math.random()*10})`;
            mctx.fillRect(Math.random()*128,Math.random()*128,2+Math.random()*8,2+Math.random()*8);
        }
        const mountainTex = new THREE.CanvasTexture(mountainCanvas);
        const mountainMat = new THREE.MeshStandardMaterial({ map:mountainTex, roughness:0.85 });
        function createMountain(x,z,scale) {
            const m = new THREE.Mesh(new THREE.ConeGeometry(3*scale,8*scale,8), mountainMat);
            m.position.set(x,4*scale,z); m.castShadow=m.receiveShadow=true; scene.add(m);
            const snow = new THREE.Mesh(new THREE.ConeGeometry(1.5*scale,1.5*scale,8), new THREE.MeshStandardMaterial({ color:0xcccccc }));
            snow.position.set(x,8.5*scale,z); snow.castShadow=true; scene.add(snow);
        }
        createMountain(-16,-35,1.9); createMountain(16,5,2.3); createMountain(-14,32,2.1);

        const rockMat = new THREE.MeshStandardMaterial({ map:mountainTex, roughness:0.9 });
        for (let i=0; i<40; i++) {
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.2+Math.random()*0.6,0), rockMat);
            rock.position.set((Math.random()-0.5)*16,0.1,(Math.random()-0.5)*80-5); rock.castShadow=rock.receiveShadow=true; scene.add(rock);
        }
        const logMat = new THREE.MeshStandardMaterial({ map:barkTex, roughness:0.75 });
        for (let i=0; i<30; i++) {
            const l = new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.25,1.2+Math.random()*2.5,6), logMat);
            l.rotation.z=Math.PI/2+(Math.random()-0.5)*0.4; l.position.set((Math.random()-0.5)*14,0.1,(Math.random()-0.5)*70-5); l.castShadow=l.receiveShadow=true; scene.add(l);
        }

        const treeBarkMat = new THREE.MeshStandardMaterial({ map:barkTex, roughness:0.9 });
        const leavesMat = new THREE.MeshStandardMaterial({ color:0x102010, roughness:0.7 });
        const leavesMat2 = new THREE.MeshStandardMaterial({ color:0x183018, roughness:0.6 });
        function createTree(x,z,scale=1) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15*scale,0.3*scale,2.5*scale,8), treeBarkMat);
            trunk.position.y=1.2*scale; trunk.castShadow=trunk.receiveShadow=true; group.add(trunk);
            const f1 = new THREE.Mesh(new THREE.ConeGeometry(0.7*scale,1.8*scale,10), leavesMat); f1.position.y=2.4*scale; f1.castShadow=f1.receiveShadow=true; group.add(f1);
            const f2 = new THREE.Mesh(new THREE.ConeGeometry(0.5*scale,1.4*scale,10), leavesMat2); f2.position.y=3.2*scale; f2.castShadow=true; group.add(f2);
            const f3 = new THREE.Mesh(new THREE.ConeGeometry(0.3*scale,1.0*scale,8), leavesMat); f3.position.y=4.0*scale; f3.castShadow=true; group.add(f3);
            group.position.set(x,0,z); scene.add(group); return group;
        }
        for (let z=-40; z<40; z+=1.8+Math.random()*2.2) {
            const side = Math.random()>0.5?-6.5:6.5;
            createTree(side+(Math.random()-0.5)*2.5, z, 0.7+Math.random()*0.9);
            if (Math.random()<0.7) createTree(side+(Math.random()-0.5)*2.5, z+0.6, 0.6+Math.random()*0.7);
        }
        for (let z=-45; z<45; z+=3.5) {
            if (Math.random()>0.4) createTree(-10+Math.random()*2, z, 1+Math.random()*0.8);
            if (Math.random()>0.4) createTree(10+Math.random()*2, z, 1+Math.random()*0.8);
        }

        // ==================== PUENTE DE MADERA ====================
        const pathTex = (() => {
            const canvas = document.createElement('canvas'); canvas.width=256; canvas.height=512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle='#3a2a1a'; ctx.fillRect(0,0,256,512);
            ctx.fillStyle='#2a1a0a';
            for (let y=0; y<512; y+=36) ctx.fillRect(0,y,256,6);
            ctx.fillStyle='#3a2a1a';
            for (let y=10; y<512; y+=72) ctx.fillRect(0,y,256,3);
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS=tex.wrapT=THREE.RepeatWrapping; return tex;
        })();
        const pathMat = new THREE.MeshStandardMaterial({ map:pathTex, roughness:0.7, metalness:0.1 });
        const pathMesh = new THREE.Mesh(new THREE.PlaneGeometry(4.8,70), pathMat);
        pathMesh.rotation.x=-Math.PI/2; pathMesh.position.set(0,0.01,-18); pathMesh.receiveShadow=true; scene.add(pathMesh);

        function createRailing(x,z,length) {
            const group = new THREE.Group();
            const postMat = new THREE.MeshStandardMaterial({ map:barkTex, roughness:0.8 });
            const railMat = new THREE.MeshStandardMaterial({ map:barkTex, roughness:0.7 });
            for (let i=-length/2; i<=length/2; i+=1.5) {
                const post = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.1,1.2,6), postMat);
                post.position.set(0,0.6,i); post.castShadow=true; group.add(post);
            }
            const rail = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,length), railMat);
            rail.position.set(0,1.2,0); rail.castShadow=true; group.add(rail);
            group.position.set(x,0,z); scene.add(group);
        }
        createRailing(-2.5,-20,50); createRailing(2.5,-20,50);

        // ==================== COCODRILO ====================
        const crocGroup = new THREE.Group();
        const skinMat = new THREE.MeshStandardMaterial({ color:0x1a4a1a, roughness:0.4, metalness:0.15 });
        const bellyMat = new THREE.MeshStandardMaterial({ color:0x8a9a6a, roughness:0.6 });
        const spikeMat = new THREE.MeshStandardMaterial({ color:0x0a1a0a, roughness:0.9 });
        const t = crocGroup;
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9,1.15,0.7), skinMat); torso.position.set(0,0.9,-0.1); torso.castShadow=torso.receiveShadow=true; t.add(torso);
        const belly = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.85,0.5), bellyMat); belly.position.set(0,0.9,-0.35); belly.castShadow=true; t.add(belly);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.45,0.8), skinMat); head.position.set(0,1.6,-0.55); head.castShadow=head.receiveShadow=true; t.add(head);
        const snout = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.28,0.6), skinMat); snout.position.set(0,1.55,-1.0); snout.castShadow=true; t.add(snout);
        const jaw = new THREE.Mesh(new THREE.BoxGeometry(0.45,0.14,0.55), skinMat); jaw.position.set(0,1.42,-1.05); jaw.castShadow=true; t.add(jaw);
        const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.12,8), new THREE.MeshStandardMaterial({ color:0xffffff })); eyeL.position.set(0.3,1.78,-0.7); t.add(eyeL);
        const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.06,4), new THREE.MeshStandardMaterial({ color:0x000000 })); pupilL.position.set(0.32,1.78,-0.78); t.add(pupilL);
        const eyeR = eyeL.clone(); eyeR.position.set(-0.3,1.78,-0.7); t.add(eyeR);
        const pupilR = pupilL.clone(); pupilR.position.set(-0.32,1.78,-0.78); t.add(pupilR);
        for (let i=0; i<6; i++) {
            const spike = new THREE.Mesh(new THREE.ConeGeometry(0.14,0.28,6), spikeMat);
            spike.position.set(0,1.0+i*0.12,0.35); spike.rotation.x=0.2; spike.castShadow=true; t.add(spike);
        }
        const armGeo = new THREE.CylinderGeometry(0.15,0.2,0.7,6);
        const armLeft = new THREE.Mesh(armGeo, skinMat); armLeft.position.set(0.55,0.65,-0.2); armLeft.rotation.z=0.4; armLeft.castShadow=true; t.add(armLeft);
        const armRight = armLeft.clone(); armRight.position.set(-0.55,0.65,-0.2); armRight.rotation.z=-0.4; t.add(armRight);
        const legGeo = new THREE.CylinderGeometry(0.26,0.3,0.9,8);
        const legLeft = new THREE.Mesh(legGeo, skinMat); legLeft.position.set(0.4,0.18,-0.1); legLeft.castShadow=true; t.add(legLeft);
        const legRight = legLeft.clone(); legRight.position.set(-0.4,0.18,-0.1); t.add(legRight);
        const footGeo = new THREE.BoxGeometry(0.4,0.14,0.5);
        const footLeft = new THREE.Mesh(footGeo, skinMat); footLeft.position.set(0.4,-0.42,-0.28); footLeft.castShadow=true; t.add(footLeft);
        const footRight = footLeft.clone(); footRight.position.set(-0.4,-0.42,-0.28); t.add(footRight);
        const tail = new THREE.Mesh(new THREE.ConeGeometry(0.3,1.3,8), skinMat); tail.position.set(0,0.45,0.7); tail.rotation.x=-0.8; tail.castShadow=true; t.add(tail);
        const tailTip = new THREE.Mesh(new THREE.ConeGeometry(0.18,0.5,6), spikeMat); tailTip.position.set(0,0.2,1.35); tailTip.rotation.x=-1.1; tailTip.castShadow=true; t.add(tailTip);
        crocGroup.position.set(0,0,0); scene.add(crocGroup);

        // ==================== ARCO DEL TRIUNFO ====================
        const triumphalArch = new THREE.Group();
        const archMat = new THREE.MeshStandardMaterial({ color:0xb8860b, roughness:0.3, metalness:0.9, emissive:new THREE.Color(0x221100), transparent:true, opacity:0 });
        const pL = new THREE.Mesh(new THREE.BoxGeometry(0.4,3.5,0.6), archMat); pL.position.set(-1.2,1.75,0); pL.castShadow=true; triumphalArch.add(pL);
        const pR = pL.clone(); pR.position.set(1.2,1.75,0); triumphalArch.add(pR);
        const aTop = new THREE.Mesh(new THREE.BoxGeometry(2.8,0.5,0.6), archMat); aTop.position.set(0,3.5,0); aTop.castShadow=true; triumphalArch.add(aTop);
        const txt = new THREE.Mesh(new THREE.PlaneGeometry(2.5,0.6), new THREE.MeshBasicMaterial({ color:0xffaa00, transparent:true, opacity:0 })); txt.position.set(0,4.1,0.35); triumphalArch.add(txt);
        triumphalArch.visible = false; scene.add(triumphalArch);

        // ==================== ESTADO DEL JUEGO ====================
        const lanes = [-2.2, 0, 2.2];
        let currentLane = 1, targetX = lanes[currentLane], gameOver = false, gameStarted = false;
        let victoryPhase = 'none';
        let victoryStartTime = 0;
        const totalGameTime = 90; let timeLeft = totalGameTime;
        let gameSpeed = 0.13; const maxSpeed = 0.45, speedIncrement = 0.0002;
        const obstacles = [];
        const obstacleTypes = ['log','hammer','mushroom','frog']; // 4 tipos
        const obstaclesPerCycle = obstacleTypes.length; // 4 obstáculos por ciclo completo
        let nextObstacleIndex = 0;
        const spawnDistanceZ = -20;

        // Sincronización con música: usamos tiempos basados en beats
        // La secuencia se calcula en tiempo real según el currentTime de la canción
        let lastSpawnBeat = -1; // beat en el que se generó el último obstáculo

        function getCurrentBeat() {
            if (!bgMusic || bgMusic.paused) return 0;
            return Math.floor(bgMusic.currentTime / BEAT_DURATION);
        }

        function setGroupOpacity(group, opacity) {
            group.children.forEach(child => {
                if (child.material) {
                    if (Array.isArray(child.material)) child.material.forEach(m => m.opacity = opacity);
                    else child.material.opacity = opacity;
                }
                if (child.children) setGroupOpacity(child, opacity);
            });
        }

        function createHammer(lane, speed=1.2) {
            const g = new THREE.Group();
            const hdl = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.14,2.6,8), new THREE.MeshStandardMaterial({ color:0x3a2a1a, roughness:0.8 }));
            hdl.position.y=1.3; hdl.castShadow=hdl.receiveShadow=true; g.add(hdl);
            const hd = new THREE.Mesh(new THREE.BoxGeometry(1.0,0.5,1.0), new THREE.MeshStandardMaterial({ color:0x5a3a1a, roughness:0.3, metalness:0.8 }));
            hd.position.y=2.8; hd.castShadow=hd.receiveShadow=true; g.add(hd);
            g.position.set(lanes[lane],0,spawnDistanceZ); scene.add(g);
            setGroupOpacity(g, 0);
            g.userData = { spawnTime: performance.now(), type: 'hammer' };
            return { group:g, type:'hammer', lane, angle:0, speed, maxSwing:0.6 };
        }
        function createRollingLog(lane, dir=1, speed=0.8) {
            const g = new THREE.Group();
            const log = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,2.0,10), new THREE.MeshStandardMaterial({ color:0x4a2a1a, roughness:0.7 }));
            log.rotation.z=Math.PI/2; log.position.y=0.7; log.castShadow=log.receiveShadow=true; g.add(log);
            g.position.set(lanes[lane],0,spawnDistanceZ); scene.add(g);
            setGroupOpacity(g, 0);
            g.userData = { spawnTime: performance.now(), type: 'log' };
            return { group:g, type:'log', lane, direction:dir, speed, logMesh:log };
        }
        function createJumpingFrog(lane) {
            const g = new THREE.Group();
            const greenMat = new THREE.MeshStandardMaterial({ color:0x2a5a1a, roughness:0.4 });
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.5,16,12), greenMat); body.scale.set(1.1,0.6,1.3); body.position.y=0.35; body.castShadow=true; g.add(body);
            const eyeW = new THREE.MeshStandardMaterial({ color:0xffffff }), pupilM = new THREE.MeshStandardMaterial({ color:0x000000 });
            const eL = new THREE.Mesh(new THREE.SphereGeometry(0.18,8), eyeW); eL.position.set(0.35,0.7,0.45); g.add(eL);
            const pL = new THREE.Mesh(new THREE.SphereGeometry(0.08,6), pupilM); pL.position.set(0.39,0.7,0.55); g.add(pL);
            const eR = eL.clone(); eR.position.set(-0.35,0.7,0.45); g.add(eR);
            const pR = pL.clone(); pR.position.set(-0.39,0.7,0.55); g.add(pR);
            const legG = new THREE.CylinderGeometry(0.1,0.08,0.5,6);
            const fl = new THREE.Mesh(legG, greenMat); fl.position.set(0.45,0.15,0.3); fl.rotation.z=0.5; fl.castShadow=true; g.add(fl);
            const fr = new THREE.Mesh(legG, greenMat); fr.position.set(-0.45,0.15,0.3); fr.rotation.z=-0.5; fr.castShadow=true; g.add(fr);
            const blG = new THREE.CylinderGeometry(0.12,0.1,0.55,6);
            const bl = new THREE.Mesh(blG, greenMat); bl.position.set(0.5,0.15,-0.25); bl.rotation.z=1.2; bl.castShadow=true; g.add(bl);
            const br = new THREE.Mesh(blG, greenMat); br.position.set(-0.5,0.15,-0.25); br.rotation.z=-1.2; br.castShadow=true; g.add(br);
            g.position.set(lanes[lane],0,spawnDistanceZ); scene.add(g);
            setGroupOpacity(g, 0);
            g.userData = { spawnTime: performance.now(), type: 'frog' };
            return { group:g, type:'frog', lane, jumpPhase:Math.random()*Math.PI*2, hasCroaked:false };
        }
        function createMushroom(lane, speed=1.8) {
            const g = new THREE.Group();
            const stalkMat = new THREE.MeshStandardMaterial({ color:0xccbb99, roughness:0.7 });
            const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.35,2.5,8), stalkMat); stalk.position.y=1.25; stalk.castShadow=stalk.receiveShadow=true; g.add(stalk);
            const capMat = new THREE.MeshStandardMaterial({ color:0xaa3333, roughness:0.5, metalness:0.2 });
            const cap = new THREE.Mesh(new THREE.SphereGeometry(0.9,16,8), capMat); cap.scale.set(1,0.3,1); cap.position.y=2.6; cap.castShadow=cap.receiveShadow=true; g.add(cap);
            const spotM = new THREE.MeshStandardMaterial({ color:0xffffff });
            const s1 = new THREE.Mesh(new THREE.SphereGeometry(0.2,8), spotM); s1.position.set(0.5,2.7,0.3); g.add(s1);
            const s2 = s1.clone(); s2.position.set(-0.4,2.7,-0.2); g.add(s2);
            const s3 = s1.clone(); s3.position.set(0.2,2.7,-0.5); g.add(s3);
            g.position.set(lanes[lane],0,spawnDistanceZ); scene.add(g);
            setGroupOpacity(g, 0);
            g.userData = { spawnTime: performance.now(), type: 'mushroom' };
            return { group:g, type:'mushroom', lane, offset:0, speed, range:0.6 };
        }

        function checkCollision() {
            const px=crocGroup.position.x, pz=crocGroup.position.z;
            for (let o of obstacles) {
                const ox=o.group.position.x, oz=o.group.position.z;
                let w=1.2,d=1.2;
                if (o.type==='log'){ w=1.6; d=0.8; }
                if (o.type==='frog'){ w=1.4; d=1.4; }
                if (o.type==='mushroom'){ w=1.2; d=1.2; }
                if (o.type==='hammer'){ w=1.4; d=1.4; }
                if (Math.abs(px-ox)<w && Math.abs(pz-oz)<d) return true;
            }
            return false;
        }

        function endGame() {
            if (victoryPhase!=='none') return;
            gameOver=true;
            stopMusic();
            playCrocScream();
            document.getElementById('message').style.display='block';
            document.getElementById('messageText').textContent='¡CHOQUE!';
            document.getElementById('messageSub').textContent='Presiona ESPACIO para intentarlo de nuevo';
        }

        function restartGame() {
            obstacles.forEach(o=>scene.remove(o.group)); obstacles.length=0;
            gameOver=false; victoryPhase='none'; timeLeft=totalGameTime; gameSpeed=0.13;
            nextObstacleIndex=0;
            lastSpawnBeat = -1;
            currentLane=1; targetX=lanes[1];
            crocGroup.position.set(targetX,0,0); crocGroup.rotation.set(0,0,0);
            triumphalArch.visible=false; triumphalArch.children.forEach(c=>c.material.opacity=0);
            document.getElementById('message').style.display='none';
            document.getElementById('timer-display').textContent='1:30';
            document.getElementById('laneInd').textContent='centro';
            startMusic();
        }

        // ==================== VICTORIA ====================
        function startVictorySequence() {
            victoryPhase = 'approaching';
            victoryStartTime = performance.now();
            gameOver = true;
            restartMusic(); // ¡Reinicia la canción!
            obstacles.forEach(o=>scene.remove(o.group)); obstacles.length=0;
            archTargetZ = crocGroup.position.z - 6;
            triumphalArch.position.set(0,0, archTargetZ);
            triumphalArch.visible = true;
            triumphalArch.children.forEach(c => c.material.opacity = 0);
            targetX = 0;
        }

        // ==================== CONTROLES ====================
        function moveLeft() { if (currentLane>0) { currentLane--; targetX=lanes[currentLane]; } }
        function moveRight() { if (currentLane<2) { currentLane++; targetX=lanes[currentLane]; } }

        window.addEventListener('keydown', e => {
            if (!gameStarted) return;
            if (gameOver && victoryPhase==='none' && e.code==='Space') { restartGame(); return; }
            if (gameOver) return;
            if (e.key==='ArrowLeft' || e.key==='a' || e.key==='A') moveLeft();
            else if (e.key==='ArrowRight' || e.key==='d' || e.key==='D') moveRight();
        });
        window.addEventListener('touchstart', e => {
            e.preventDefault();
            if (!gameStarted || gameOver) return;
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth/2) moveLeft(); else moveRight();
        }, { passive:false });
        window.addEventListener('touchmove', e => e.preventDefault(), { passive:false });

        document.getElementById('startButton').addEventListener('click', () => {
            document.getElementById('start-screen').style.display='none';
            document.getElementById('ui').style.display='flex';
            gameStarted=true;
            restartGame();
            startMusic();
        });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let archTargetZ = 0;
        let danceStartTime = 0;

        // ==================== BUCLE PRINCIPAL ====================
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const now = performance.now();

            clouds.forEach(c => { c.position.x += 0.015; if (c.position.x>28) c.position.x = -28; });
            birds.forEach(b => {
                b.userData.angle += b.userData.speed;
                b.position.x = Math.cos(b.userData.angle)*b.userData.radius;
                b.position.z = Math.sin(b.userData.angle)*b.userData.radius;
                b.position.y = b.userData.baseY + Math.sin(b.userData.angle*2)*0.5;
            });

            if (gameStarted && victoryPhase==='none' && !gameOver) {
                timeLeft -= delta;
                if (timeLeft<=0) { timeLeft=0; startVictorySequence(); }
                document.getElementById('timer-display').textContent = `${Math.floor(timeLeft/60)}:${String(Math.floor(timeLeft%60)).padStart(2,'0')}`;
                document.getElementById('laneInd').textContent = ['izq','centro','der'][currentLane];

                gameSpeed = Math.min(gameSpeed + speedIncrement, maxSpeed);
                crocGroup.position.x += (targetX - crocGroup.position.x) * 0.12;

                const t = performance.now()*0.001;
                const runC = Math.sin(t*10), runS = 0.5+gameSpeed*0.5;
                legLeft.rotation.x = runC*runS; legRight.rotation.x = -runC*runS;
                footLeft.rotation.x = runC*runS*0.4; footRight.rotation.x = -runC*runS*0.4;
                armLeft.rotation.x = -runC*runS*0.8; armRight.rotation.x = runC*runS*0.8;
                tail.rotation.y = Math.sin(t*6)*0.35; tailTip.rotation.y = Math.sin(t*6+0.5)*0.4;
                crocGroup.position.y = Math.abs(runC)*0.1*runS;
                crocGroup.rotation.z = runC*0.04; crocGroup.rotation.x = Math.cos(t*10)*0.03;

                pathTex.offset.y += gameSpeed*0.08;

                // Sincronización musical: spawnear obstáculo en cada beat múltiplo de OBSTACLE_BEATS
                const currentBeat = getCurrentBeat();
                if (currentBeat > lastSpawnBeat && currentBeat % OBSTACLE_BEATS === 0) {
                    // Determinar tipo y carril según secuencia cíclica
                    const typeIndex = nextObstacleIndex % obstacleTypes.length;
                    const type = obstacleTypes[typeIndex];
                    const lane = nextObstacleIndex % 3; // 0,1,2 rotando
                    let speed = 0.7 + (nextObstacleIndex % 3) * 0.2;
                    if (type === 'mushroom') speed = 1.5 + (nextObstacleIndex % 4) * 0.4;
                    if (type === 'hammer') speed = 0.9 + (nextObstacleIndex % 5) * 0.15;
                    const direction = (nextObstacleIndex % 2 === 0) ? 1 : -1;

                    let obs;
                    switch(type) {
                        case 'hammer': obs = createHammer(lane, speed); break;
                        case 'log': obs = createRollingLog(lane, direction, speed); break;
                        case 'frog': obs = createJumpingFrog(lane); break;
                        case 'mushroom': obs = createMushroom(lane, speed); break;
                    }
                    obstacles.push(obs);
                    lastSpawnBeat = currentBeat;
                    nextObstacleIndex++;
                }

                // Fade-in de obstáculos
                obstacles.forEach(o => {
                    const age = (now - o.group.userData.spawnTime) / 1000;
                    const opacity = Math.min(1, age * 2);
                    setGroupOpacity(o.group, opacity);
                });

                // Mover y animar obstáculos
                for (let i=obstacles.length-1; i>=0; i--) {
                    const o = obstacles[i];
                    o.group.position.z += gameSpeed;
                    if (o.type==='hammer') {
                        o.angle += o.speed*0.06; o.group.rotation.z = Math.sin(o.angle)*0.8;
                        o.group.position.x = lanes[o.lane] + Math.sin(o.angle)*o.maxSwing;
                    } else if (o.type==='log') {
                        o.logMesh.rotation.x += o.speed*0.15*(o.direction||1);
                    } else if (o.type==='frog') {
                        o.jumpPhase += 0.1; const fy = Math.abs(Math.sin(o.jumpPhase))*1.8;
                        o.group.children[0].position.y = 0.35+fy; o.group.position.y = fy*0.6;
                    } else if (o.type==='mushroom') {
                        o.offset += o.speed*0.02; o.group.position.x = lanes[o.lane] + Math.sin(o.offset)*o.range;
                    }
                    if (o.group.position.z > 6) { scene.remove(o.group); obstacles.splice(i,1); }
                }

                if (checkCollision()) endGame();
            }

            if (victoryPhase==='approaching') {
                const elapsed = (now - victoryStartTime) / 1000;
                const archOpacity = Math.min(1, elapsed / 1.5);
                triumphalArch.children.forEach(c => c.material.opacity = archOpacity);

                crocGroup.position.x += (0 - crocGroup.position.x) * 0.1;
                gameSpeed = Math.max(0.1, gameSpeed * 0.99);
                crocGroup.position.z -= gameSpeed;

                const tl = performance.now()*0.001;
                const runS = 0.2 + gameSpeed*0.3;
                legLeft.rotation.x = Math.sin(tl*8)*runS; legRight.rotation.x = -Math.sin(tl*8)*runS;
                footLeft.rotation.x = Math.sin(tl*8)*runS*0.4; footRight.rotation.x = -Math.sin(tl*8)*runS*0.4;
                armLeft.rotation.x = -Math.sin(tl*8)*runS*0.6; armRight.rotation.x = Math.sin(tl*8)*runS*0.6;
                tail.rotation.y = Math.sin(tl*5)*0.2; tailTip.rotation.y = Math.sin(tl*5+0.5)*0.2;
                crocGroup.position.y = Math.abs(Math.sin(tl*8))*0.08;
                crocGroup.rotation.z = Math.sin(tl*8)*0.03;

                if (Math.abs(crocGroup.position.x) < 0.05 && crocGroup.position.z <= archTargetZ + 1.2) {
                    victoryPhase = 'crossing';
                    crocGroup.position.z = archTargetZ;
                    gameSpeed = 0;
                }
            } else if (victoryPhase==='crossing') {
                crocGroup.rotation.y += 0.04;
                if (crocGroup.rotation.y >= Math.PI) {
                    crocGroup.rotation.y = Math.PI;
                    victoryPhase = 'dancing';
                    danceStartTime = now;
                    document.getElementById('message').style.display='block';
                    document.getElementById('messageText').textContent='¡VICTORIA!';
                    document.getElementById('messageSub').textContent='';
                }
            } else if (victoryPhase==='dancing') {
                const el = (now - danceStartTime)/1000;
                const dC = Math.sin(el*8);
                crocGroup.position.y = Math.abs(dC)*0.3; crocGroup.rotation.z = dC*0.2;
                armLeft.rotation.z = 0.4 + Math.sin(el*12)*0.8; armRight.rotation.z = -0.4 - Math.sin(el*12)*0.8;
                legLeft.rotation.x = Math.sin(el*6)*0.4; legRight.rotation.x = -Math.sin(el*6)*0.4;
                tail.rotation.y = Math.sin(el*10)*0.6; crocGroup.rotation.y = Math.PI + Math.sin(el*2)*0.4;
                if (el > 4) document.getElementById('messageSub').textContent = '¡Eres el rey del pantano! Presiona ESPACIO';
            }

            const camX = Math.sin(now*0.001)*0.2, camY=5.5+Math.sin(now*0.0015)*0.2, camZ=7.2;
            camera.position.copy(crocGroup.position).add(new THREE.Vector3(camX,camY,camZ));
            camera.lookAt(crocGroup.position.x, 1.8, crocGroup.position.z-4);
            backLight.position.copy(crocGroup.position).add(new THREE.Vector3(0,2.5,2.5));
            renderer.render(scene, camera);
        }
        animate();
        console.log('🐊 Coco\'s Run sincronizado con la música.');
    </script>
</body>
</html>
